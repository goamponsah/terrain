<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terrain — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --ink:#1c1814;--ink-soft:#3d3530;--ink-muted:#8a7d72;
      --cream:#f5f0e8;--parchment:#ede6d6;--warm-bg:#faf7f2;
      --border:#ddd4c4;--terra:#c4613a;--terra-lt:#e8896a;
      --green:#3a5c42;--gold:#b8922a;
    }
    body{background:var(--warm-bg);color:var(--ink);font-family:'Syne',sans-serif;font-size:14px;min-height:100vh;}
    nav{background:var(--ink);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:0.12em;color:#fff;}
    .nav-badge{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--terra);background:rgba(196,97,58,0.15);border:1px solid rgba(196,97,58,0.3);border-radius:4px;padding:3px 8px;}
    main{max-width:1200px;margin:0 auto;padding:40px 32px;}
    h1{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;color:var(--ink);margin-bottom:6px;}
    .sub{font-size:13px;color:var(--ink-muted);margin-bottom:32px;}

    /* Summary cards */
    .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:40px;}
    .s-card{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:20px 24px;}
    .s-card.dark{background:var(--ink);border-color:var(--ink);}
    .s-label{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:8px;}
    .s-card.dark .s-label{color:rgba(255,255,255,0.35);}
    .s-value{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:var(--ink);line-height:1;}
    .s-card.dark .s-value{color:#fff;}
    .s-value.green{color:var(--green);}
    .s-value.terra{color:var(--terra);}

    /* Table */
    .table-wrap{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
    table{width:100%;border-collapse:collapse;}
    thead{background:var(--ink);}
    thead th{padding:12px 16px;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.45);text-align:left;}
    tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s;}
    tbody tr:last-child{border-bottom:none;}
    tbody tr:hover{background:var(--cream);}
    tbody td{padding:14px 16px;font-size:13px;color:var(--ink-soft);vertical-align:middle;}
    .lodge-name{font-weight:600;color:var(--ink);font-size:14px;}
    .lodge-email{font-size:11px;color:var(--ink-muted);font-family:'DM Mono',monospace;}
    .plan-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;}
    .plan-trial{background:rgba(184,146,42,0.12);color:var(--gold);border:1px solid rgba(184,146,42,0.3);}
    .plan-active{background:rgba(58,92,66,0.12);color:var(--green);border:1px solid rgba(58,92,66,0.3);}
    .plan-cancelled{background:rgba(196,97,58,0.1);color:var(--terra);border:1px solid rgba(196,97,58,0.25);}
    .mono{font-family:'DM Mono',monospace;font-size:13px;}
    .uplift-pos{color:var(--green);font-weight:700;}
    .uplift-neg{color:var(--terra);font-weight:700;}
    .uplift-zero{color:var(--ink-muted);}
    .no-data{color:var(--ink-muted);font-style:italic;font-size:12px;}
    .loading{text-align:center;padding:60px;color:var(--ink-muted);}
    .error-msg{background:rgba(196,97,58,0.08);border:1px solid rgba(196,97,58,0.2);border-radius:8px;padding:20px;color:var(--terra);text-align:center;margin:40px 0;}
    .nav-right{display:flex;align-items:center;gap:12px;}
    .btn{cursor:pointer;border:none;border-radius:5px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.06em;padding:7px 14px;}
    .btn-refresh{background:rgba(255,255,255,0.1);color:#fff;}
    .btn-refresh:hover{background:rgba(255,255,255,0.18);}
    .btn-logout{background:rgba(196,97,58,0.2);color:var(--terra-lt);border:1px solid rgba(196,97,58,0.3);}
    .btn-logout:hover{background:rgba(196,97,58,0.35);}
    .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
    .search-input{flex:1;min-width:200px;padding:9px 14px;border:1px solid var(--border);border-radius:6px;font-family:'Syne',sans-serif;font-size:13px;background:#fff;color:var(--ink);outline:none;}
    .search-input:focus{border-color:var(--ink-muted);}
    .filter-select{padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-family:'Syne',sans-serif;font-size:13px;background:#fff;color:var(--ink);outline:none;cursor:pointer;}
    .refresh-info{font-size:11px;color:var(--ink-muted);white-space:nowrap;}
    .plan-founding{background:rgba(28,24,20,0.9);color:#d4af6a;border:1px solid rgba(212,175,106,0.4);}
  </style>
</head>
<body>
<nav>
  <span class="nav-logo">TERRAIN</span>
  <div class="nav-right">
    <span class="nav-badge">Admin</span>
    <button class="btn btn-refresh" onclick="manualRefresh()">↻ Refresh</button>
    <button class="btn btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<main>
  <h1>Lodge Overview</h1>
  <p class="sub" id="subText">Loading...</p>

  <div class="summary" id="summaryCards">
    <div class="s-card"><div class="s-label">Total Lodges</div><div class="s-value" id="totalLodges">—</div></div>
    <div class="s-card"><div class="s-label">Active / Trial</div><div class="s-value terra" id="activeLodges">—</div></div>
    <div class="s-card dark"><div class="s-label">Total Fixed Revenue</div><div class="s-value" id="totalFixed">—</div></div>
    <div class="s-card dark"><div class="s-label">Total Uplift (This Month)</div><div class="s-value green" id="totalUplift">—</div></div>
  </div>

  <div class="toolbar">
    <input class="search-input" id="searchInput" type="text" placeholder="Search lodge name, email or country…" oninput="filterTable()" />
    <select class="filter-select" id="planFilter" onchange="filterTable()">
      <option value="">All Plans</option>
      <option value="trial">Trial</option>
      <option value="founding">Founding</option>
      <option value="starter">Starter</option>
      <option value="growth">Growth</option>
      <option value="active">Active</option>
      <option value="cancelled">Cancelled</option>
    </select>
    <span class="refresh-info" id="refreshInfo">Auto-refreshes every 30s</span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Lodge</th>
          <th>Country</th>
          <th>Plan</th>
          <th>Suites</th>
          <th>Days Entered</th>
          <th>At Fixed Rate</th>
          <th>At Rec. Rate</th>
          <th>Uplift</th>
          <th>Joined</th>
        </tr>
      </thead>
      <tbody id="lodgeTable">
        <tr><td colspan="9" class="loading">Loading lodge data...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script>
const fmt = n => '$' + Math.abs(n).toLocaleString();
let allLodges = [];
let refreshTimer;

function logout() {
  fetch('/api/auth/logout', { method: 'POST' }).finally(() => {
    window.location.href = '/admin';
  });
}

function manualRefresh() {
  clearInterval(refreshTimer);
  loadAdmin();
  startAutoRefresh();
}

function startAutoRefresh() {
  refreshTimer = setInterval(() => {
    loadAdmin();
    updateRefreshInfo();
  }, 30000);
}

function updateRefreshInfo() {
  const now = new Date();
  const t = now.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('refreshInfo').textContent = `Last updated ${t} · auto-refreshes every 30s`;
}

function getPlanClass(plan) {
  if (!plan) return 'plan-cancelled';
  const p = plan.toLowerCase();
  if (p === 'founding') return 'plan-founding';
  if (p === 'active' || p === 'growth' || p === 'starter' || p === 'portfolio') return 'plan-active';
  if (p === 'trial') return 'plan-trial';
  return 'plan-cancelled';
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const plan = document.getElementById('planFilter').value.toLowerCase();
  const filtered = allLodges.filter(l => {
    const matchSearch = !q ||
      (l.name || '').toLowerCase().includes(q) ||
      (l.email || '').toLowerCase().includes(q) ||
      (l.country || '').toLowerCase().includes(q);
    const matchPlan = !plan || (l.plan || '').toLowerCase() === plan;
    return matchSearch && matchPlan;
  });
  renderRows(filtered);
}

function renderRows(lodges) {
  if (lodges.length === 0) {
    document.getElementById('lodgeTable').innerHTML = '<tr><td colspan="9" class="loading">No lodges match your search.</td></tr>';
    return;
  }
  document.getElementById('lodgeTable').innerHTML = lodges.map(l => {
    const planClass = getPlanClass(l.plan);
    const upliftClass = l.uplift > 0 ? 'uplift-pos' : l.uplift < 0 ? 'uplift-neg' : 'uplift-zero';
    const upliftStr = l.daysWithData > 0 ? (l.uplift >= 0 ? '+' : '-') + fmt(l.uplift) : '<span class="no-data">No data</span>';
    const fixedStr = l.daysWithData > 0 ? fmt(l.fixedRevenue) : '<span class="no-data">—</span>';
    const recStr = l.daysWithData > 0 ? fmt(l.recRevenue) : '<span class="no-data">—</span>';
    const joined = new Date(l.created_at).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'2-digit'});

    return `<tr>
      <td>
        <div class="lodge-name">${l.name}</div>
        <div class="lodge-email">${l.email}</div>
      </td>
      <td>${l.country || '—'}</td>
      <td><span class="plan-badge ${planClass}">${l.plan}</span></td>
      <td class="mono">${l.suites || '—'}</td>
      <td class="mono">${l.daysWithData > 0 ? l.daysWithData + ' days' : '<span class="no-data">None yet</span>'}</td>
      <td class="mono">${fixedStr}</td>
      <td class="mono">${recStr}</td>
      <td class="mono ${l.daysWithData > 0 ? upliftClass : ''}">${upliftStr}</td>
      <td class="mono">${joined}</td>
    </tr>`;
  }).join('');
}

async function loadAdmin() {
  try {
    const res = await fetch('/api/admin/overview');
    if (res.status === 403) {
      document.getElementById('lodgeTable').innerHTML = '<tr><td colspan="9"><div class="error-msg">Access denied. Admin only.</div></td></tr>';
      document.getElementById('subText').textContent = 'You do not have admin access.';
      return;
    }
    const data = await res.json();
    allLodges = data.lodges || [];

    // Summary
    const totalFixed = allLodges.reduce((s,l) => s + l.fixedRevenue, 0);
    const totalUplift = allLodges.reduce((s,l) => s + l.uplift, 0);
    const active = allLodges.filter(l => l.plan === 'active' || l.plan === 'trial' || l.plan === 'founding').length;
    const foundingCount = allLodges.filter(l => (l.plan || '').toLowerCase() === 'founding').length;

    document.getElementById('totalLodges').textContent = allLodges.length;
    document.getElementById('activeLodges').textContent = active;
    document.getElementById('totalFixed').textContent = fmt(totalFixed);
    document.getElementById('totalUplift').textContent = (totalUplift >= 0 ? '+' : '-') + fmt(totalUplift);
    document.getElementById('subText').textContent = `${allLodges.length} lodge${allLodges.length !== 1 ? 's' : ''} on Terrain · ${foundingCount} Founding Lodge${foundingCount !== 1 ? 's' : ''} · Updated now`;

    updateRefreshInfo();
    filterTable();

  } catch(err) {
    document.getElementById('lodgeTable').innerHTML = `<tr><td colspan="9"><div class="error-msg">Error loading data: ${err.message}</div></td></tr>`;
  }
}

loadAdmin();
startAutoRefresh();
</script>
</body>
</html>
