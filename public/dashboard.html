<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Terrain — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Syne:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1c1814; --ink-soft: #3d3530; --ink-muted: #8a7d72; --ink-faint: #c4b9ad;
      --cream: #f5f0e8; --parchment: #ede6d6; --warm: #faf7f2;
      --border: #ddd4c4; --border2: #ccc0ae;
      --terra: #c4613a; --terra-lt: #e8896a;
      --forest: #3a5c42; --forest-lt: #5a8c63;
      --gold: #b8922a; --sky: #3a5878;
      --sidebar-w: 240px;
    }
    html, body { height: 100%; background: var(--warm); color: var(--ink); font-family: 'Syne', sans-serif; font-size: 13px; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.5;
    }

    .app { display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w); background: var(--ink);
      display: flex; flex-direction: column;
      padding: 0; flex-shrink: 0; overflow: hidden; position: relative;
    }
    .sidebar::after {
      content: 'T'; position: absolute; bottom: -30px; right: -10px;
      font-family: 'Cormorant Garamond', serif; font-size: 200px; font-weight: 700;
      color: rgba(255,255,255,0.025); pointer-events: none; line-height: 1;
    }
    .sidebar-top { padding: 28px 24px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .logo-name { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: var(--cream); letter-spacing: 0.08em; }
    .logo-sub { font-size: 9px; color: rgba(255,255,255,0.25); letter-spacing: 0.16em; text-transform: uppercase; margin-top: 3px; }

    .prop-pill {
      margin-top: 16px; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      padding: 10px 12px; cursor: pointer;
    }
    .prop-pill-label { font-size: 9px; color: rgba(255,255,255,0.28); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 3px; }
    .prop-pill-name { font-family: 'Cormorant Garamond', serif; font-size: 15px; color: var(--cream); }
    .prop-pill-meta { font-size: 10px; color: rgba(255,255,255,0.32); margin-top: 2px; }

    .nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
    .nav-label { font-size: 9px; color: rgba(255,255,255,0.22); text-transform: uppercase; letter-spacing: 0.14em; padding: 0 12px; margin: 14px 0 5px; }
    .nav-item {
      display: flex; align-items: center; gap: 9px; padding: 9px 12px;
      border-radius: 6px; color: rgba(255,255,255,0.4); text-decoration: none;
      font-size: 12px; transition: all 0.15s; margin-bottom: 1px; cursor: pointer;
      font-family: 'Syne', sans-serif;
    }
    .nav-item svg { width: 14px; height: 14px; flex-shrink: 0; }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.7); }
    .nav-item.active { background: rgba(196,97,58,0.2); color: var(--terra-lt); font-weight: 500; }

    .sidebar-footer { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.07); }
    .weather-mini { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; background: rgba(255,255,255,0.05); border-radius: 6px; padding: 8px 10px; }
    .wm-temp { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--cream); }
    .wm-info { font-size: 10px; color: rgba(255,255,255,0.3); line-height: 1.4; }
    .user-mini { display: flex; align-items: center; gap: 8px; }
    .avatar { width: 28px; height: 28px; background: var(--terra); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .user-name { font-size: 12px; color: rgba(255,255,255,0.55); }
    .user-role-label { font-size: 10px; color: rgba(255,255,255,0.28); }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: var(--warm); }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 32px; border-bottom: 1px solid var(--border);
      background: var(--warm); position: sticky; top: 0; z-index: 10;
    }
    .page-eyebrow { font-size: 10px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 3px; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 500; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .date-chip { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink-muted); background: var(--parchment); border: 1px solid var(--border); padding: 5px 10px; border-radius: 16px; }
    .btn-primary { background: var(--terra); color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Syne', sans-serif; transition: all 0.15s; }
    .btn-primary:hover { background: var(--terra-lt); }
    .btn-ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--border2); border-radius: 6px; padding: 8px 14px; font-size: 12px; cursor: pointer; font-family: 'Syne', sans-serif; transition: all 0.15s; }
    .btn-ghost:hover { border-color: var(--ink-muted); }

    /* Content */
    .content { padding: 24px 32px; display: flex; flex-direction: column; gap: 20px; }

    /* Setup banner */
    .setup-banner {
      background: linear-gradient(135deg, var(--ink) 0%, #2d2420 100%);
      border-radius: 10px; padding: 20px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sb-left { display: flex; align-items: center; gap: 14px; }
    .sb-icon { font-size: 28px; }
    .sb-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--cream); margin-bottom: 3px; }
    .sb-desc { font-size: 12px; color: rgba(255,255,255,0.4); }
    .sb-btn { background: var(--terra); color: #fff; border: none; border-radius: 6px; padding: 9px 18px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Syne', sans-serif; white-space: nowrap; }

    /* KPI Strip */
    .kpi-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    .kpi-card { background: var(--cream); border: 1px solid var(--border); border-radius: 9px; padding: 18px 20px; position: relative; overflow: hidden; transition: box-shadow 0.2s; }
    .kpi-card:hover { box-shadow: 0 4px 18px rgba(28,24,20,0.08); }
    .kpi-card.accent { background: var(--ink); border-color: var(--ink); }
    .kpi-card.accent .kpi-label { color: rgba(255,255,255,0.35); }
    .kpi-card.accent .kpi-value { color: var(--cream); }
    .kpi-card.accent .kpi-delta { color: var(--terra-lt); }
    .kpi-card.accent .kpi-orn { color: rgba(255,255,255,0.05); }
    .kpi-label { font-size: 10px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .kpi-value { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 600; line-height: 1; margin-bottom: 5px; }
    .kpi-delta { font-size: 11px; color: var(--ink-muted); }
    .kpi-delta.up { color: var(--forest); }
    .kpi-delta.down { color: var(--terra); }
    .kpi-orn { position: absolute; right: 12px; bottom: 8px; font-family: 'Cormorant Garamond', serif; font-size: 60px; font-weight: 700; color: rgba(28,24,20,0.04); line-height: 1; pointer-events: none; }

    /* Two col */
    .two-col { display: grid; grid-template-columns: 1fr 320px; gap: 16px; }

    /* Card */
    .card { background: var(--cream); border: 1px solid var(--border); border-radius: 9px; padding: 20px 22px; }
    .card-ey { font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-muted); margin-bottom: 5px; }
    .card-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 500; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }

    /* Package rows */
    .pkg-list { display: flex; flex-direction: column; gap: 8px; }
    .pkg-row { display: flex; align-items: center; gap: 12px; padding: 11px 13px; background: var(--warm); border: 1px solid var(--border); border-radius: 6px; transition: all 0.15s; cursor: pointer; }
    .pkg-row:hover { border-color: var(--border2); background: var(--parchment); }
    .pkg-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .pkg-body { flex: 1; }
    .pkg-name { font-size: 12px; font-weight: 500; margin-bottom: 1px; }
    .pkg-meta { font-size: 10px; color: var(--ink-muted); }
    .pkg-rate { text-align: right; }
    .pkg-curr { font-family: 'DM Mono', monospace; font-size: 13px; }
    .pkg-opt { font-size: 10px; color: var(--terra); margin-top: 1px; font-family: 'DM Mono', monospace; }
    .pkg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* Scarcity */
    .sc-list { display: flex; flex-direction: column; gap: 8px; }
    .sc-item { padding: 11px 13px; border-radius: 6px; border-left: 3px solid var(--border2); background: var(--warm); }
    .sc-item.crit { border-color: var(--terra); background: rgba(196,97,58,0.04); }
    .sc-item.high { border-color: var(--gold); background: rgba(184,146,42,0.04); }
    .sc-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .sc-name { font-size: 12px; font-weight: 500; }
    .sc-badge { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 6px; border-radius: 8px; }
    .sc-item.crit .sc-badge { background: rgba(196,97,58,0.12); color: var(--terra); }
    .sc-item.high .sc-badge { background: rgba(184,146,42,0.12); color: var(--gold); }
    .sc-bw { height: 3px; background: var(--border); border-radius: 2px; margin: 6px 0 4px; overflow: hidden; }
    .sc-bf { height: 100%; border-radius: 2px; }
    .sc-item.crit .sc-bf { background: var(--terra); }
    .sc-item.high .sc-bf { background: var(--gold); }
    .sc-item:not(.crit):not(.high) .sc-bf { background: var(--forest); }
    .sc-ft { display: flex; justify-content: space-between; font-size: 10px; color: var(--ink-muted); font-family: 'DM Mono', monospace; }

    /* Recs */
    .rec-list { display: flex; flex-direction: column; gap: 9px; }
    .rec-item { display: flex; gap: 11px; align-items: flex-start; padding: 13px; border-radius: 6px; background: var(--warm); border: 1px solid var(--border); transition: all 0.15s; }
    .rec-item:hover { border-color: var(--terra); }
    .rec-n { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--ink-faint); line-height: 1; flex-shrink: 0; width: 24px; }
    .rec-body { flex: 1; }
    .rec-title { font-size: 12px; font-weight: 500; margin-bottom: 3px; }
    .rec-desc { font-size: 11px; color: var(--ink-muted); line-height: 1.5; }
    .rec-uplift { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--forest); margin-top: 4px; }
    .rec-btn { background: var(--ink); color: var(--cream); border: none; border-radius: 5px; padding: 6px 12px; font-size: 11px; cursor: pointer; white-space: nowrap; font-family: 'Syne', sans-serif; align-self: center; transition: background 0.15s; }
    .rec-btn:hover { background: var(--terra); }

    /* Channel bars */
    .ch-bars { display: flex; flex-direction: column; gap: 10px; }
    .ch-bar-row { display: flex; align-items: center; gap: 10px; }
    .ch-bar-name { width: 120px; font-size: 11px; color: var(--ink-soft); flex-shrink: 0; }
    .ch-bar-wrap { flex: 1; height: 16px; background: var(--parchment); border-radius: 3px; overflow: hidden; }
    .ch-bar-fill { height: 100%; border-radius: 3px; }
    .ch-bar-val { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink-muted); width: 32px; text-align: right; flex-shrink: 0; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .kpi-card { animation: fadeUp 0.35s ease both; }
    .kpi-card:nth-child(1) { animation-delay: 0.05s; }
    .kpi-card:nth-child(2) { animation-delay: 0.1s; }
    .kpi-card:nth-child(3) { animation-delay: 0.15s; }
    .kpi-card:nth-child(4) { animation-delay: 0.2s; }

    .toast { position: fixed; bottom: 28px; right: 28px; background: var(--ink); border: 1px solid rgba(255,255,255,0.1); border-radius: 9px; padding: 16px 20px; z-index: 1000; max-width: 300px; box-shadow: 0 10px 36px rgba(0,0,0,0.25); animation: fadeUp 0.2s ease; font-family: 'Syne', sans-serif; }

    /* ============ MOBILE ============ */
    @media (max-width: 768px) {
      .app { flex-direction: column; height: auto; overflow: visible; }

      .sidebar {
        width: 100%; height: auto;
        flex-direction: row; flex-wrap: wrap;
        overflow: visible;
      }
      .sidebar::after { display: none; }
      .sidebar-top { width: 100%; padding: 16px 20px; }
      .logo-name { font-size: 20px; }
      .logo-sub { font-size: 8px; }
      .prop-pill { margin-top: 10px; padding: 8px 10px; }
      .prop-pill-name { font-size: 13px; }

      /* Nav becomes horizontal scrollable bar */
      .nav {
        display: flex; flex-direction: row;
        overflow-x: auto; padding: 8px 12px;
        width: 100%; gap: 4px;
        border-top: 1px solid rgba(255,255,255,0.07);
      }
      .nav::-webkit-scrollbar { display: none; }
      .nav-label { display: none; }
      .nav-item {
        flex-direction: column; gap: 3px;
        padding: 8px 10px; font-size: 10px;
        white-space: nowrap; flex-shrink: 0;
        border-radius: 8px; text-align: center;
      }
      .nav-item svg { width: 18px; height: 18px; }

      .sidebar-footer { display: none; }

      .main { overflow-y: visible; }
      .topbar {
        flex-direction: column; gap: 10px;
        padding: 16px 20px; position: relative;
        align-items: flex-start;
      }
      .topbar-right { flex-wrap: wrap; gap: 8px; width: 100%; }
      .btn-ghost, .btn-primary { font-size: 11px; padding: 7px 12px; }
      .date-chip { font-size: 10px; }
      .page-title { font-size: 20px; }

      .content { padding: 16px 16px 60px; gap: 14px; }

      /* KPI strip — 2 columns on mobile */
      .kpi-strip { grid-template-columns: 1fr 1fr !important; gap: 10px; }
      .kpi-value { font-size: 22px; }
      .kpi-orn { display: none; }

      /* Two col becomes single col */
      .two-col { grid-template-columns: 1fr !important; gap: 14px; }

      /* Chart */
      .chart-wrap { height: 140px; }

      /* Package rows */
      .pkg-row { flex-wrap: wrap; }
      .pkg-icon { width: 28px; height: 28px; font-size: 12px; }

      /* Scarcity */
      .sc-ft { font-size: 9px; }

      /* Recs */
      .rec-item { flex-direction: column; gap: 8px; }
      .rec-btn { align-self: flex-start; }

      /* Channel bars */
      .ch-bar-name { width: 90px; font-size: 10px; }

      /* Save banner */
      div[style*="position: fixed; bottom: 0"] {
        flex-direction: column !important;
        gap: 10px !important;
        padding: 14px 16px !important;
      }

      .toast { right: 12px; left: 12px; max-width: none; }
    }
    /* ================================ */
  </style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo-name">TERRAIN</div>
      <div class="logo-sub">Experience Revenue Intelligence</div>
      <div class="prop-pill">
        <div class="prop-pill-label">Active Property</div>
        <div class="prop-pill-name" id="sidePropName">Loading…</div>
        <div class="prop-pill-meta" id="sidePropMeta">—</div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-label">Revenue</div>
      <a class="nav-item" href="/dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Overview
      </a>
      <a class="nav-item" href="/calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Rate Calendar
      </a>

    </nav>
    <div class="sidebar-footer">
      <div class="user-mini">
        <div class="avatar" id="userAvatar">?</div>
        <div style="flex:1;"></div>
        <button onclick="doLogout()" style="background:none;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.4);border-radius:5px;padding:4px 10px;font-size:10px;cursor:pointer;font-family:'Syne',sans-serif;flex-shrink:0;transition:all 0.15s;" onmouseover="this.style.borderColor='rgba(196,97,58,0.5)';this.style.color='#e8896a'" onmouseout="this.style.borderColor='rgba(255,255,255,0.15)';this.style.color='rgba(255,255,255,0.4)'">Log out</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="page-eyebrow">Revenue Overview</div>
        <div class="page-title" id="topbarTitle">Loading your dashboard…</div>
      </div>
      <div class="topbar-right">
        <div class="date-chip" id="topbarDate">—</div>
      </div>
    </div>

    <div class="content" id="mainContent">
      <div style="display:flex;align-items:center;justify-content:center;height:300px;color:var(--ink-muted);">Loading…</div>
    </div>
  </main>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  try {
    // Try to load from database if logged in
    const me = await fetch('/api/auth/me').then(r => r.json());

    if (me.user) {
      const lodgeData = await fetch('/api/lodge').then(r => r.json());
      if (lodgeData.lodge) {
        const cfg = {
          name: lodgeData.lodge.name,
          suites: lodgeData.lodge.suites,
          currency: lodgeData.lodge.currency || 'USD',
          country: lodgeData.lodge.country,
          type: lodgeData.lodge.property_type,
          packages: (lodgeData.packages || []).map(p => ({ name: p.name || p, base_rate: p.base_rate })),
          channels: (lodgeData.channels || []).map(c => c.name || c),
          userEmail: me.user.email
        };
        buildDashboard(cfg);
        if (me.trial && me.trial.daysRemaining <= 30) showTrialBanner(me.trial.daysRemaining);
        return;
      } else {
        // Logged in but no lodge — go to onboarding
        window.location.href = '/onboarding';
        return;
      }
    }

    // Guest — load from localStorage
    const raw = localStorage.getItem('terrainConfig');
    if (!raw) { window.location.href = '/onboarding'; return; }
    const config = JSON.parse(raw);
    if (!config || !config.name) { window.location.href = '/onboarding'; return; }
    buildDashboard(config);

    if (!me.user) showSaveBanner(config.name);

  } catch (err) {
    console.error('Dashboard load error:', err);
    try {
      const raw = localStorage.getItem('terrainConfig');
      if (raw) {
        const config = JSON.parse(raw);
        if (config && config.name) { buildDashboard(config); return; }
      }
    } catch(e) {}
    window.location.href = '/onboarding';
  }
});

function doPushPricing(btn) {
  btn.textContent = 'Pushing\u2026';
  btn.disabled = true;
  btn.style.opacity = '0.7';
  setTimeout(function() {
    btn.textContent = '\u2713 Pricing Pushed';
    btn.style.background = '#3a5c42';
    btn.style.opacity = '1';
    var t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:28px;right:28px;background:#1c1814;border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:20px 24px;z-index:1000;max-width:300px;font-family:Syne,sans-serif;box-shadow:0 10px 36px rgba(0,0,0,0.25);';
    t.innerHTML = '<div style="font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;">Pricing Update Sent</div>'
      + '<div style="font-size:13px;color:#f5f0e8;margin-bottom:8px;">Optimal rates pushed to all channels</div>'
      + '<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:12px;">Changes reflect within 60 seconds.</div>'
      + '<div style="font-size:11px;margin-bottom:6px;display:flex;justify-content:space-between;"><span style="color:rgba(255,255,255,0.4);">Direct Website</span><span style="color:#5a8c63;">\u2713 Updated</span></div>'
      + '<div style="font-size:11px;margin-bottom:6px;display:flex;justify-content:space-between;"><span style="color:rgba(255,255,255,0.4);">Travel Agents</span><span style="color:#5a8c63;">\u2713 Notified</span></div>'

}

function buildDashboard(cfg) {
  try {
  if (!cfg || !cfg.name) { window.location.href = '/onboarding'; return; }
  const sym = cfg.currency === 'ZAR' ? 'R' : cfg.currency === 'BWP' ? 'P' : cfg.currency === 'EUR' ? '€' : cfg.currency === 'GBP' ? '£' : '$';
  const suites = parseInt(cfg.suites) || 24;
  const userEmail = cfg.userEmail || '';

  cfg.packages = cfg.packages || [];
  cfg.channels = cfg.channels || [];

  // Sidebar — use email for avatar and name, nothing else
  const emailName = userEmail.split('@')[0] || cfg.name;
  const emailInitials = emailName.slice(0,2).toUpperCase();
  document.getElementById('userAvatar').textContent = emailInitials;
  document.getElementById('userName').textContent = emailName;
  document.getElementById('sidePropName').textContent = cfg.name;
  document.getElementById('sidePropMeta').textContent = (cfg.type || 'Safari Lodge') + ' · ' + suites + ' suites · ' + (cfg.country || '');
  document.getElementById('topbarTitle').textContent = 'Welcome back — ' + cfg.name;

  // Date range label
  const now = new Date();
  const endDate = new Date(now); endDate.setDate(now.getDate() + 30);
  const fmtOpts = { month: 'short', day: 'numeric', year: '2-digit' };
  document.getElementById('topbarDate').textContent = now.toLocaleDateString('en-GB', fmtOpts) + ' – ' + endDate.toLocaleDateString('en-GB', fmtOpts);

  // Real calendar data
  // Clear stale localStorage if it belongs to a different lodge
  const storedConfig = localStorage.getItem('terrainConfig');
  if (storedConfig) {
    try {
      const stored = JSON.parse(storedConfig);
      if (stored.name && cfg.name && stored.name !== cfg.name) {
        localStorage.removeItem('terrainCalendarV2');
        localStorage.removeItem('terrainActualRates');
        localStorage.removeItem('terrainManualBooked');
        localStorage.setItem('terrainConfig', JSON.stringify({name:cfg.name}));
      }
    } catch(e) {}
  }

  const calRaw = localStorage.getItem('terrainCalendarV2');
  const calData = calRaw ? JSON.parse(calRaw) : {};
  const year = now.getFullYear(), month = now.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const spp = Math.max(1, Math.floor(suites / Math.max(1, cfg.packages.length)));
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let daysWithData = 0, soldOut = 0, surgeDays = 0, totalBooked = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const key = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    if (!calData[key] || Object.keys(calData[key]).length === 0) continue;
    daysWithData++;
    const tot = Object.values(calData[key]).reduce((s,v) => s + (parseInt(v)||0), 0);
    const maxT = Math.max(1, cfg.packages.length) * spp;
    const pct = Math.round((tot / maxT) * 100);
    if (pct >= 100) soldOut++;
    if (pct >= 85 && pct < 100) surgeDays++;
    totalBooked += tot;
  }
  const avgOcc = daysWithData > 0 ? Math.round((totalBooked / (daysWithData * suites)) * 100) : null;

  const noDataMsg = 'No bookings entered yet for ' + MONTHS_SHORT[month] + '. Open the Rate Calendar to get started.';
  const hasDataMsg = daysWithData + ' days entered for ' + MONTHS_SHORT[month] + '. Open the calendar to review rates and track revenue.';

  document.getElementById('mainContent').innerHTML =
    '<div class="setup-banner">' +
      '<div class="sb-left">' +
        '<div class="sb-icon">🎯</div>' +
        '<div>' +
          '<div class="sb-title">' + cfg.name + ' is live on Terrain</div>' +
          '<div class="sb-desc">' + cfg.packages.length + ' packages · ' + suites + ' suites · ' + MONTHS_SHORT[month] + ' ' + year + '</div>' +
        '</div>' +
      '</div>' +
      
    '</div>' +

    '<div class="kpi-strip">' +
      '<div class="kpi-card accent">' +
        '<div class="kpi-label">Days with Bookings</div>' +
        '<div class="kpi-value">' + (daysWithData > 0 ? daysWithData : '—') + '</div>' +
        '<div class="kpi-delta ' + (daysWithData > 0 ? 'up' : '') + '">' + (daysWithData > 0 ? 'of ' + daysInMonth + ' days this month' : 'Enter bookings in Rate Calendar') + '</div>' +
        '<div class="kpi-orn">📅</div>' +
      '</div>' +
      '<div class="kpi-card">' +
        '<div class="kpi-label">Avg Occupancy</div>' +
        '<div class="kpi-value">' + (avgOcc !== null ? avgOcc + '%' : '—') + '</div>' +
        '<div class="kpi-delta">' + (avgOcc !== null ? 'Based on ' + daysWithData + ' days entered' : 'No data yet') + '</div>' +
        '<div class="kpi-orn">%</div>' +
      '</div>' +
      '<div class="kpi-card">' +
        '<div class="kpi-label">Sold Out Days</div>' +
        '<div class="kpi-value" style="' + (soldOut > 0 ? 'color:var(--terra);' : '') + '">' + (daysWithData > 0 ? soldOut : '—') + '</div>' +
        '<div class="kpi-delta">' + (daysWithData > 0 ? '100% occupancy days' : 'No data yet') + '</div>' +
        '<div class="kpi-orn">🔥</div>' +
      '</div>' +
      '<div class="kpi-card">' +
        '<div class="kpi-label">Surge Opportunities</div>' +
        '<div class="kpi-value" style="' + (surgeDays > 0 ? 'color:#b8922a;' : '') + '">' + (daysWithData > 0 ? surgeDays : '—') + '</div>' +
        '<div class="kpi-delta">' + (daysWithData > 0 ? 'Days at 85%+ — raise rates' : 'No data yet') + '</div>' +
        '<div class="kpi-orn">↑</div>' +
      '</div>' +
    '</div>' +

    '<div class="two-col">' +
      '<div style="display:flex;flex-direction:column;gap:16px;">' +
        '<div class="card" style="text-align:center;padding:48px 32px;">' +
          '<div style="font-size:48px;margin-bottom:16px;">📅</div>' +
          '<div style="font-family:Cormorant Garamond,serif;font-size:24px;font-weight:500;color:var(--ink);margin-bottom:10px;">Rate Calendar</div>' +
          '<div style="font-size:13px;color:var(--ink-muted);line-height:1.7;margin-bottom:24px;max-width:380px;margin-left:auto;margin-right:auto;">' +
            (daysWithData === 0 ? noDataMsg : hasDataMsg) +
          '</div>' +
          '<button onclick="goTo(&quot;calendar&quot;)" style="background:var(--terra);color:#fff;border:none;border-radius:8px;padding:14px 36px;font-size:14px;font-weight:600;cursor:pointer;font-family:Syne,sans-serif;">' +
            'Open Rate Calendar →' +
          '</button>' +
        '</div>' +
      '</div>' +
      '<div style="display:flex;flex-direction:column;gap:14px;">' +
        '<div class="card">' +
          '<div class="card-ey">Property</div>' +
          '<div class="card-title" style="font-size:18px;">' + cfg.name + '</div>' +
          '<div style="margin-top:12px;display:flex;flex-direction:column;gap:8px;">' +
            '<div style="display:flex;justify-content:space-between;font-size:12px;border-bottom:1px solid var(--border);padding-bottom:8px;"><span style="color:var(--ink-muted);">Type</span><span style="font-weight:500;">' + (cfg.type || 'Safari Lodge') + '</span></div>' +
            '<div style="display:flex;justify-content:space-between;font-size:12px;border-bottom:1px solid var(--border);padding-bottom:8px;"><span style="color:var(--ink-muted);">Suites</span><span style="font-weight:500;">' + suites + '</span></div>' +
            '<div style="display:flex;justify-content:space-between;font-size:12px;border-bottom:1px solid var(--border);padding-bottom:8px;"><span style="color:var(--ink-muted);">Country</span><span style="font-weight:500;">' + (cfg.country || '—') + '</span></div>' +
            '<div style="display:flex;justify-content:space-between;font-size:12px;"><span style="color:var(--ink-muted);">Currency</span><span style="font-weight:500;">' + (cfg.currency || 'USD') + '</span></div>' +
          '</div>' +
          '<button onclick="goTo(&quot;onboarding&quot;)" style="width:100%;margin-top:16px;background:none;border:1px solid var(--border);border-radius:6px;padding:9px;font-size:12px;cursor:pointer;font-family:Syne,sans-serif;color:var(--ink-soft);">Edit Property Settings</button>' +
        '</div>' +
        '<div class="card">' +
          '<div class="card-ey">Packages</div>' +
          '<div style="display:flex;flex-direction:column;gap:6px;margin-top:8px;">' +
            (cfg.packages.length > 0
              ? cfg.packages.map(function(p){ return '<div style="font-size:12px;color:var(--ink-soft);padding:6px 8px;background:var(--parchment);border-radius:5px;">' + String(p.name || p) + '</div>'; }).join('')
              : '<div style="font-size:12px;color:var(--ink-muted);">No packages configured yet.</div>') +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  } catch(err) {
    console.error('buildDashboard error:', err);
    document.getElementById('mainContent').innerHTML =
      '<div style="padding:40px;text-align:center;color:#c4613a;">' +
      '<div style="font-size:32px;margin-bottom:16px;">⚠️</div>' +
      '<div style="font-size:16px;margin-bottom:8px;">Dashboard failed to load</div>' +
      '<div style="font-size:12px;color:#8a7d72;margin-bottom:24px;">' + err.message + '</div>' +
      '<button onclick="goTo(&quot;onboarding&quot;)" style="background:var(--terra);color:#fff;border:none;border-radius:6px;padding:10px 24px;cursor:pointer;font-size:13px;">Go to Setup →</button>' +
      '</div>';
    document.getElementById('topbarTitle').textContent = 'Dashboard error';
  }
}

  const diff = opt - rate;
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `
    <div style="font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;">Package Pricing</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:17px;color:#f5f0e8;margin-bottom:10px;">${name}</div>
    <div style="display:flex;gap:10px;margin-bottom:12px;">
      <div style="flex:1;background:rgba(255,255,255,0.06);border-radius:6px;padding:8px;">
        <div style="font-size:9px;color:rgba(255,255,255,0.28);margin-bottom:3px;">Current</div>
        <div style="font-family:'DM Mono',monospace;font-size:16px;color:#f5f0e8;">${sym}${rate.toLocaleString()}</div>
      </div>
      <div style="flex:1;background:rgba(196,97,58,0.12);border:1px solid rgba(196,97,58,0.3);border-radius:6px;padding:8px;">
        <div style="font-size:9px;color:rgba(196,97,58,0.6);margin-bottom:3px;">Optimal</div>
        <div style="font-family:'DM Mono',monospace;font-size:16px;color:#e8896a;">${sym}${opt.toLocaleString()}</div>
      </div>
    </div>
    ${diff !== 0 ? `<div style="font-size:11px;color:${diff>0?'#5a8c63':'#e8896a'};margin-bottom:12px;">${diff>0?'↑':'↓'} ${diff>0?'+':''}${sym}${Math.abs(diff)} per booking</div>` : `<div style="font-size:11px;color:#5a8c63;margin-bottom:12px;">✓ At optimal</div>`}
    <button onclick="document.querySelector('.toast').remove()" style="background:#c4613a;border:none;border-radius:5px;padding:7px 14px;font-size:11px;font-weight:600;cursor:pointer;color:#fff;font-family:'Syne',sans-serif;">Apply Rate</button>
    <button onclick="document.querySelector('.toast').remove()" style="background:none;border:none;color:rgba(255,255,255,0.28);font-size:11px;cursor:pointer;margin-left:6px;">Close</button>
  `;
  document.body.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 6000);
}

  btn.disabled = true;
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `
    <div style="font-size:9px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;">Applied</div>
    <div style="font-size:12px;color:#f5f0e8;margin-bottom:8px;">${label}</div>
    <div style="font-size:10px;color:rgba(255,255,255,0.35);">Syncing across all booking channels…</div>
  `;
  document.body.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3500);
}
