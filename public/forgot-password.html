<html lang="en">

  <title>Terrain — Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Syne:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink: #1c1814; --cream: #f5f0e8; --warm: #faf7f2; --border: #ddd4c4; --terra: #c4613a; --terra-lt: #e8896a; --forest: #3a5c42; }
    html, body { min-height: 100vh; background: var(--ink); font-family: 'Syne', sans-serif; color: var(--cream); display: flex; flex-direction: column; align-items: center; justify-content: center; }
    body::before {
      content: 'TERRAIN'; position: fixed; bottom: -40px; left: -20px;
      font-family: 'Cormorant Garamond', serif; font-size: 200px; font-weight: 700;
      color: rgba(255,255,255,0.025); pointer-events: none; line-height: 1; letter-spacing: -6px;
    }
    .container { width: 100%; max-width: 420px; padding: 40px 20px; position: relative; z-index: 1; }
    .logo { text-align: center; margin-bottom: 40px; }
    .logo-name { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 600; letter-spacing: 0.1em; }
    .logo-sub { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 4px; }
    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 36px 32px; }
    .card-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 500; margin-bottom: 8px; }
    .card-sub { font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 28px; line-height: 1.6; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.4); margin-bottom: 7px; }
    .field input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 7px; padding: 13px 14px; font-size: 14px; color: var(--cream); font-family: 'Syne', sans-serif; outline: none; transition: border-color 0.15s; }
    .field input:focus { border-color: var(--terra); }
    .field input::placeholder { color: rgba(255,255,255,0.2); }
    .btn-submit { width: 100%; background: var(--terra); color: #fff; border: none; border-radius: 7px; padding: 14px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Syne', sans-serif; letter-spacing: 0.03em; margin-top: 8px; transition: background 0.15s; }
    .btn-submit:hover { background: var(--terra-lt); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { background: rgba(196,97,58,0.15); border: 1px solid rgba(196,97,58,0.3); border-radius: 6px; padding: 10px 12px; font-size: 12px; color: var(--terra-lt); margin-bottom: 16px; display: none; }
    .success { background: rgba(58,92,66,0.15); border: 1px solid rgba(58,92,66,0.3); border-radius: 6px; padding: 14px; font-size: 13px; color: #5a8c63; display: none; text-align: center; line-height: 1.6; }
    .back-link { text-align: center; margin-top: 20px; font-size: 12px; color: rgba(255,255,255,0.3); }
    .back-link a { color: var(--terra-lt); text-decoration: none; }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-name">TERRAIN</div>
    <div class="logo-sub">Experience Revenue Intelligence</div>
  </div>
  <div class="card">
    <div class="card-title">Forgot password?</div>
    <div class="card-sub">Enter your email address and we'll send you a link to reset your password. The link expires in 1 hour.</div>
    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>
    <div id="formArea">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@yourlodge.com" autocomplete="email"/>
      </div>
      <button class="btn-submit" id="submitBtn" onclick="sendReset()">Send Reset Link</button>
    </div>
    <div class="back-link"><a href="/login">← Back to login</a></div>
  </div>
</div>
<script>
  document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') sendReset(); });

  async function sendReset() {
    const email = document.getElementById('email').value.trim();
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('errorMsg');
    const suc = document.getElementById('successMsg');

    if (!email) { showError('Please enter your email address'); return; }

    btn.disabled = true;
    btn.textContent = 'Sending…';
    err.style.display = 'none';

    try {
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();

      // Always show success even if email not found — security best practice
      document.getElementById('formArea').style.display = 'none';
      suc.style.display = 'block';
      suc.innerHTML = `✓ If an account exists for <strong>${email}</strong>, you'll receive a password reset link within a few minutes.<br/><br/>Check your spam folder if you don't see it.`;

    } catch {
      showError('Connection error — please try again');
      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
    }
  }

  function showError(msg) {
    const err = document.getElementById('errorMsg');
    err.textContent = msg;
    err.style.display = 'block';
  }
</script>

<div style="text-align:center;padding:20px 24px 32px;font-size:11px;color:#a09890;font-family:'Syne',sans-serif;width:100%;">
  © 2026 Techsoftnexa LTD · Terrain is a product of Techsoftnexa LTD
</div>
</body>
</html>
