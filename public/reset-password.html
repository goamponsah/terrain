<html lang="en">
<head>

  <meta property="og:description" content="The revenue intelligence platform built for luxury safari lodges. Dynamic pricing, demand forecasting, and channel optimization — purpose-built for the bush."/>
  <meta property="og:image" content="https://getonterrain.com/og-image.png"/>
  <meta property="og:url" content="https://getonterrain.com"/>

  <meta name="twitter:title" content="Terrain — Experience Revenue Intelligence"/>
  <meta name="twitter:description" content="Revenue intelligence platform built for luxury safari lodges and experience operators."/>
  <meta name="twitter:image" content="https://getonterrain.com/og-image.png"/>

  <title>Terrain — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Syne:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink: #1c1814; --cream: #f5f0e8; --terra: #c4613a; --terra-lt: #e8896a; --forest: #3a5c42; }
    html, body { min-height: 100vh; background: var(--ink); font-family: 'Syne', sans-serif; color: var(--cream); display: flex; align-items: center; justify-content: center; }
    body::before { content: 'TERRAIN'; position: fixed; bottom: -40px; left: -20px; font-family: 'Cormorant Garamond', serif; font-size: 200px; font-weight: 700; color: rgba(255,255,255,0.025); pointer-events: none; line-height: 1; letter-spacing: -6px; }
    .container { width: 100%; max-width: 420px; padding: 40px 20px; position: relative; z-index: 1; }
    .logo { text-align: center; margin-bottom: 40px; }
    .logo-name { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 600; letter-spacing: 0.1em; }
    .logo-sub { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 4px; }
    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 36px 32px; }
    .card-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 500; margin-bottom: 8px; }
    .card-sub { font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.4); margin-bottom: 7px; }
    .field input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 7px; padding: 13px 14px; font-size: 14px; color: var(--cream); font-family: 'Syne', sans-serif; outline: none; transition: border-color 0.15s; }
    .field input:focus { border-color: var(--terra); }
    .field input::placeholder { color: rgba(255,255,255,0.2); }
    .hint { font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 5px; }
    .btn-submit { width: 100%; background: var(--terra); color: #fff; border: none; border-radius: 7px; padding: 14px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Syne', sans-serif; margin-top: 8px; transition: background 0.15s; }
    .btn-submit:hover { background: var(--terra-lt); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { background: rgba(196,97,58,0.15); border: 1px solid rgba(196,97,58,0.3); border-radius: 6px; padding: 10px 12px; font-size: 12px; color: var(--terra-lt); margin-bottom: 16px; display: none; }
    .invalid-token { text-align: center; padding: 20px 0; }
    .invalid-token p { color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 16px; line-height: 1.6; }
    .invalid-token a { color: var(--terra-lt); text-decoration: none; font-size: 13px; }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-name">TERRAIN</div>
    <div class="logo-sub">Experience Revenue Intelligence</div>
  </div>
  <div class="card" id="mainCard">
    <div style="text-align:center;color:rgba(255,255,255,0.4);font-size:13px;">Verifying reset link…</div>
  </div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    showInvalid('No reset token found. Please request a new password reset link.');
  } else {
    // Verify token is valid
    fetch(`/api/auth/verify-reset-token?token=${token}`)
      .then(r => r.json())
      .then(data => {
        if (data.valid) showForm();
        else showInvalid('This reset link has expired or already been used. Please request a new one.');
      })
      .catch(() => showInvalid('Unable to verify reset link. Please try again.'));
  }

  function showForm() {
    document.getElementById('mainCard').innerHTML = `
      <div class="card-title">Set new password</div>
      <div class="card-sub">Choose a strong password for your Terrain account.</div>
      <div class="error" id="errorMsg"></div>
      <div class="field">
        <label>New Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password"/>
        <div class="hint">Minimum 6 characters</div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password"/>
      </div>
      <button class="btn-submit" id="submitBtn" onclick="doReset()">Set New Password</button>
    `;
    document.getElementById('confirm').addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
  }

  function showInvalid(msg) {
    document.getElementById('mainCard').innerHTML = `
      <div class="invalid-token">
        <div style="font-size:32px;margin-bottom:12px;">⚠️</div>
        <p>${msg}</p>
        <a href="/forgot-password">Request new reset link →</a>
      </div>
    `;
  }

  async function doReset() {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('errorMsg');

    if (password.length < 6) { showErr('Password must be at least 6 characters'); return; }
    if (password !== confirm) { showErr('Passwords do not match'); return; }

    btn.disabled = true;
    btn.textContent = 'Updating…';
    err.style.display = 'none';

    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();

      if (data.success) {
        document.getElementById('mainCard').innerHTML = `
          <div style="text-align:center;padding:20px 0;">
            <div style="font-size:40px;margin-bottom:16px;">✓</div>
            <div style="font-family:'Cormorant Garamond',serif;font-size:24px;margin-bottom:10px;">Password updated</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:24px;">Your password has been successfully changed.</div>
            <a href="/login" style="background:#c4613a;color:#fff;border-radius:7px;padding:12px 28px;font-size:13px;font-weight:600;text-decoration:none;font-family:Syne,sans-serif;">Sign in now →</a>
          </div>
        `;
      } else {
        showErr(data.error || 'Reset failed — please try again');
        btn.disabled = false;
        btn.textContent = 'Set New Password';
      }
    } catch {
      showErr('Connection error — please try again');
      btn.disabled = false;
      btn.textContent = 'Set New Password';
    }
  }

  function showErr(msg) {
    const err = document.getElementById('errorMsg');
    if (err) { err.textContent = msg; err.style.display = 'block'; }
  }
</script>

<div style="text-align:center;padding:20px 24px 32px;font-size:11px;color:#a09890;font-family:'Syne',sans-serif;border-top:1px solid #e8ddd0;margin-top:40px;">
  © 2026 TechSoftNexa LTD &nbsp;·&nbsp; Terrain is a product of TechSoftNexa LTD, registered in Ghana
</div>
</body>
</html>
