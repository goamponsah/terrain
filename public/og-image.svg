  <rect x="960" y="520" width="160" height="48" rx="8" fill="rgba(196,97,58,0.2)" stroke="rgba(196,97,58,0.4)" stroke-width="1"/>
  <text x="1040" y="540" font-family="Arial, sans-serif" font-size="11" fill="#e8896a" text-anchor="middle" letter-spacing="1">FREE TRIAL</text>
  <text x="1040" y="558" font-family="Arial, sans-serif" font-size="13" fill="#f5f0e8" text-anchor="middle" font-weight="bold">90 Days</text>
