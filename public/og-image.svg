<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1c1814"/>
  
  <!-- Subtle texture overlay -->
  <rect width="1200" height="630" fill="url(#grain)" opacity="0.03"/>
  
  <!-- Left accent line -->
  <rect x="80" y="80" width="3" height="470" fill="#c4613a" opacity="0.6"/>
  
  <!-- Large background T watermark -->
  <text x="820" y="580" font-family="Georgia, serif" font-size="520" font-weight="700" fill="rgba(255,255,255,0.025)" letter-spacing="-20">T</text>

  <!-- Eyebrow -->
  <text x="112" y="148" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.35)" letter-spacing="4">EXPERIENCE REVENUE INTELLIGENCE</text>

  <!-- Main logo -->
  <text x="108" y="260" font-family="Georgia, serif" font-size="96" font-weight="700" fill="#f5f0e8" letter-spacing="8">TERRAIN</text>

  <!-- Divider -->
  <rect x="108" y="288" width="120" height="2" fill="#c4613a"/>

  <!-- Tagline -->
  <text x="108" y="340" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.6)" letter-spacing="0">Revenue intelligence built for luxury safari lodges</text>
  <text x="108" y="372" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.6)" letter-spacing="0">and experience operators.</text>

  <!-- Feature pills -->
  <rect x="108" y="420" width="190" height="36" rx="18" fill="rgba(196,97,58,0.15)" stroke="rgba(196,97,58,0.3)" stroke-width="1"/>
  <text x="203" y="443" font-family="Arial, sans-serif" font-size="13" fill="#e8896a" text-anchor="middle">Dynamic Pricing</text>

  <rect x="312" y="420" width="200" height="36" rx="18" fill="rgba(58,88,120,0.15)" stroke="rgba(58,88,120,0.3)" stroke-width="1"/>
  <text x="412" y="443" font-family="Arial, sans-serif" font-size="13" fill="#7ab0d4" text-anchor="middle">Demand Forecasting</text>

  <rect x="526" y="420" width="200" height="36" rx="18" fill="rgba(58,92,66,0.15)" stroke="rgba(58,92,66,0.3)" stroke-width="1"/>
  <text x="626" y="443" font-family="Arial, sans-serif" font-size="13" fill="#5a8c63" text-anchor="middle">Channel Optimization</text>

